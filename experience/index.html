<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <title>Riya K Alex | Portfolio</title>
    
    <style>
        /* This style block is self-contained so it works regardless of your other files */
        #forced-skills-section {
            background: #5A1CC8 !important;
            padding: 60px 20px !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            font-family: sans-serif;
        }
        .skill-grid {
            display: flex !important;
            flex-wrap: wrap !important;
            justify-content: center !important;
            gap: 20px !important;
            max-width: 1000px;
            margin: 0 auto;
        }
        .skill-item {
            background: #010124 !important;
            border: 1px solid #ffae00 !important;
            border-radius: 15px;
            padding: 25px;
            width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }
        .skill-item img { height: 50px; margin-bottom: 15px; }
        .skill-item span { color: white; font-weight: bold; font-size: 1.1rem; text-align: center;}
        .section-title { text-align: center; color: white; font-size: 3rem; margin-bottom: 40px; }
    </style>
</head>
<body>

<section id="forced-skills-section">
    <h2 class="section-title">Technical <span style="color: #ffae00;">Skills</span></h2>
    
    <div class="skill-grid">
        <div class="skill-item">
            <img src="https://img.icons8.com/color/48/000000/processor.png" alt="Verilog">
            <span>Verilog HDL</span>
        </div>
        <div class="skill-item">
            <img src="https://img.icons8.com/color/48/000000/circuit.png" alt="KiCad">
            <span>KiCad PCB</span>
        </div>
        <div class="skill-item">
            <img src="https://img.icons8.com/color/48/000000/microchip.png" alt="Embedded C">
            <span>Embedded C</span>
        </div>
        <div class="skill-item">
            <img src="https://img.icons8.com/color/48/000000/python--v1.png" alt="Python">
            <span>Python</span>
        </div>
        <div class="skill-item">
            <img src="https://img.icons8.com/glyph-neue/48/ffffff/github.png" alt="GitHub">
            <span>GitHub</span>
        </div>
        <div class="skill-item">
            <img src="https://img.icons8.com/color/48/000000/copybook.png" alt="Technical Writing">
            <span>Tech Writing</span>
        </div>
    </div>
</section>

<div style="text-align:center; padding: 20px; background: #5A1CC8;">
    <a href="/" style="color: white; text-decoration: none; border: 1px solid white; padding: 10px 20px; border-radius: 5px;">Back to Home</a>
</div>

</body>
</html>
